<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Now - Travel Taniti</title>
</head>
<body>

  <table border="0" width="800" align="center" cellpadding="10">

    <!-- HEADER -->
    <tr>
      <td colspan="4" align="center">
        <img src="header.png" alt="Header Image" width="100%">
      </td>
    </tr>

    <!-- TOP NAVIGATION -->
    <tr>
      <td colspan="4" align="center">
        <a href="index.html"><img src="home.png" width="100" alt="Home"></a>
        <a href="geography.html"><img src="geo.png" width="100" alt="Geography"></a>
        <a href="restaurants.html"><img src="rest.png" width="100" alt="Restaurants"></a>
        <a href="activities.html"><img src="activities.png" width="100" alt="Activities"></a>
        <a href="amenities.html"><img src="amenities.png" width="100" alt="Amenities"></a>
      </td>
    </tr>

    <!-- BREADCRUMB -->
    <tr>
      <td colspan="4">
        <a href="index.html">Home</a> &gt; <a href="book-now.html">Book Now</a>
      </td>
    </tr>

    <!-- PAGE TITLE -->
    <tr>
      <td colspan="4" align="center">
        <h2>Book Your Trip to Taniti</h2>
      </td>
    </tr>

    <!-- BOOKING FORM -->
    <tr>
      <td colspan="4" align="center">

        <form>

          <label>Full Name:</label><br>
          <input type="text" name="name" size="40"><br><br>

          <label>Email:</label><br>
          <input type="email" name="email" size="40"><br><br>

          <label>Arrival Date:</label><br>
          <input type="date" name="arrival"><br><br>

          <label>Departure Date:</label><br>
          <input type="date" name="departure"><br><br>

          <label>Number of Guests:</label><br>
          <input type="number" name="guests" min="1" max="10"><br><br>

          <label>Room Type:</label><br>
          <select name="room">
            <option>Standard Room</option>
            <option>Ocean View Room</option>
            <option>Luxury Suite</option>
          </select><br><br>

          <label>Special Requests:</label><br>
          <textarea name="requests" rows="4" cols="40"></textarea><br><br>

          <input type="submit" value="Submit Booking">

        </form>

      </td>
    </tr>

    <!-- FOOTER -->
    <tr>
      <td colspan="4" align="center">
        <img src="logo.png" alt="Logo" width="100"><br><br>

        Travel Taniti<br>
        123 Oceanview Drive, Paradise Bay, Taniti<br>
        (123) 456-7890<br>
        info@TravelTaniti.com
      </td>
    </tr>

    <!-- HOME LINK -->
    <tr>
      <td colspan="4" align="center">
        <a href="index.html">Home Page</a>
      </td>
    </tr>

  </table>

</body>
</html>
